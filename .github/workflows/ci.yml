name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Lint, Security, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd server
          pip install -r requirements.txt
          pip install ruff bandit pip-audit pytest
      - name: Lint (ruff)
        run: ruff check server/
      - name: Security scan (bandit)
        run: bandit -r server/app/ -ll
      - name: Dependency audit (pip-audit)
        run: pip-audit -r server/requirements.txt
      - name: Tests (pytest)
        run: |
          cd server
          if [ -d tests ] || find . -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pytest --tb=short
          else
            echo "No tests found, skipping pytest."
          fi

  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -f server/Dockerfile .
