services:
  openfy-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - openfy_data:/data
    env_file:
      - .env
    environment:
      - OPENFY_ALLOWED_ORIGINS=http://localhost:8000,http://127.0.0.1:8000

volumes:
  openfy_data:
