<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/static/mobile/manifest.json">
    <link rel="icon" href="/static/images/logo.png">
    <title>Openfy</title>
    <link rel="stylesheet" href="/static/mobile/styles.css?v=OPENFY_VERSION_5">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous">
</head>
<body>
    <!-- Auth Overlay -->
    <div class="auth-overlay" id="auth-overlay">
        <div class="auth-box">
            <div class="auth-logo"><img src="/static/images/logo.png" alt="Openfy"></div>
            <h2 class="auth-title">Log in to Openfy</h2>
            <div class="auth-form" id="auth-signin">
                <div class="input-wrapper">
                    <i class="fa-solid fa-key input-icon"></i>
                    <input type="text" id="signin-hash" placeholder="Enter your Auth Hash" autocomplete="off" />
                </div>
                <button class="auth-btn" id="signin-btn">
                    <span class="btn-text">Log In</span>
                    <span class="btn-loader" style="display:none;"><i class="fa-solid fa-spinner fa-spin"></i></span>
                </button>
                <p class="auth-status" id="signin-status"></p>
            </div>
            <p class="auth-switch">Don't have an account? <a href="#" id="show-signup">Sign up</a></p>
            <div class="auth-form" id="auth-signup" style="display:none;">
                <div class="input-wrapper">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" id="signup-name" placeholder="Choose a username" autocomplete="off" />
                </div>
                <button class="auth-btn auth-btn-outline" id="signup-btn">
                    <span class="btn-text">Sign Up</span>
                    <span class="btn-loader" style="display:none;"><i class="fa-solid fa-spinner fa-spin"></i></span>
                </button>
                <p class="auth-status" id="signup-status"></p>
            </div>
            <p class="auth-switch" id="back-to-signin" style="display:none;">Already have an account? <a href="#" id="show-signin">Log in</a></p>
            <p class="auth-hint"><i class="fa-solid fa-info-circle"></i> Your Auth Hash is your password. Save it securely!</p>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" style="display:none;">
        <div class="detail-gradient" id="detail-gradient"></div>
        <!-- Top Bar -->
        <header class="top-bar" id="top-bar">
            <button class="top-bar-btn" id="top-bar-back" style="display:none;">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <span class="top-bar-greeting" id="top-bar-greeting"></span>
            <div class="top-bar-search" id="top-bar-search" style="display:none;">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="What do you want to play?" autocomplete="off" />
            </div>
            <button class="top-bar-btn" id="top-bar-profile">
                <i class="fa-solid fa-user top-bar-profile-icon" id="top-bar-profile-icon"></i>
                <img id="top-bar-profile-img" class="top-bar-profile-img" src="" alt="Profile" style="display:none;">
            </button>
            <div class="profile-dropdown" id="profile-dropdown">
                <div class="profile-dropdown-header">
                    <span id="profile-dropdown-name"></span>
                </div>
                <div class="profile-dropdown-divider"></div>
                <div class="profile-dropdown-item" id="profile-dropdown-profile"><i class="fa-solid fa-user"></i> Profile</div>
                <div class="profile-dropdown-item" id="profile-dropdown-settings"><i class="fa-solid fa-gear"></i> Settings</div>
                <div class="profile-dropdown-item" id="profile-dropdown-admin" style="display:none;"><i class="fa-solid fa-user-shield"></i> Admin</div>
                <div class="profile-dropdown-divider"></div>
                <div class="profile-dropdown-item" id="profile-dropdown-logout"><i class="fa-solid fa-right-from-bracket"></i> Log out</div>
            </div>
        </header>

        <!-- Page: Home -->
        <main class="page active" id="page-home">
            <section class="section">
                <div class="section-header">
                    <h2>Most Played</h2>
                </div>
                <div class="horiz-scroll" id="most-played-scroll">
                    <div class="horiz-scroll-inner" id="most-played-grid"></div>
                </div>
            </section>
            <section class="section">
                <div class="section-header">
                    <h2>Latest</h2>
                </div>
                <div class="horiz-scroll">
                    <div class="horiz-scroll-inner" id="tracks-row-0"></div>
                </div>
                <div class="horiz-scroll">
                    <div class="horiz-scroll-inner" id="tracks-row-1"></div>
                </div>
                <div class="horiz-scroll">
                    <div class="horiz-scroll-inner" id="tracks-row-2"></div>
                </div>
            </section>
        </main>

        <!-- Page: Search -->
        <main class="page" id="page-search">
            <div class="search-page-header">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="search-page-input" placeholder="What do you want to play?" autocomplete="off" />
                </div>
            </div>
            <div class="search-content" id="search-content">
                <div class="section" id="recent-searches-section">
                    <h2>Recent Searches</h2>
                    <div id="recent-searches"></div>
                </div>
                <div class="section" id="search-results-section" style="display:none;">
                    <h2>Results</h2>
                    <div id="search-results"></div>
                </div>
            </div>
        </main>

        <!-- Page: Library -->
        <main class="page" id="page-library">
            <div class="page-header">
                <h1>Your Library</h1>
            </div>
            <div class="library-toggle-bar">
                <button class="pill-btn active" data-filter="all">All</button>
                <button class="pill-btn" data-filter="playlists">Playlists</button>
                <button class="pill-btn" data-filter="albums">Albums</button>
                <button class="pill-btn" data-filter="artists">Artists</button>
            </div>
            <div class="library-content" id="library-content">
                <div id="library-items"></div>
            </div>
        </main>

        <!-- Page: Playlist/Album/Artist Detail -->
        <main class="page" id="page-detail">
            <div class="detail-header">
                <div class="detail-art" id="detail-art">
                    <div class="detail-art-placeholder" id="detail-art-placeholder">
                        <i class="fa-solid fa-music"></i>
                    </div>
                    <img id="detail-art-img" style="display:none;" />
                </div>
                <h1 id="detail-title"></h1>
                <p id="detail-subtitle"></p>
            </div>
            <div class="detail-bottom-panel">
                <div class="detail-actions">
                    <button class="detail-play-btn" id="detail-play-btn">
                        <i class="fa-solid fa-play"></i>
                    </button>
                    <button type="button" class="detail-follow-btn" id="detail-follow-btn" title="Follow" style="display:none;">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                    <button class="detail-shuffle-btn" id="detail-shuffle-btn">
                        <i class="fa-solid fa-shuffle"></i>
                    </button>
                </div>
                <div class="detail-tracks" id="detail-tracks"></div>
            </div>
        </main>

        <!-- Page: Now Playing (Full Screen) -->
        <main class="page now-playing-page" id="page-now-playing">
            <div class="np-gradient" id="np-gradient"></div>
            <header class="np-top-bar">
                <button class="np-btn" id="np-down-btn">
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
                <button class="np-btn" id="np-menu-btn">
                    <i class="fa-solid fa-ellipsis-h"></i>
                </button>
            </header>
            <div class="np-artwork" id="np-artwork">
                <div class="np-art-placeholder">
                    <i class="fa-solid fa-music"></i>
                </div>
                <img id="np-art-img" style="display:none;" />
            </div>
            <div class="np-info">
                <div class="np-text">
                    <h2 id="np-title">No track playing</h2>
                    <p id="np-artist"></p>
                </div>
                <button class="np-like-btn" id="np-like-btn">
                    <i class="fa-regular fa-heart"></i>
                </button>
            </div>
            <div class="np-progress-area">
                <div class="np-progress-bar" id="np-progress-bar">
                    <div class="np-progress-fill" id="np-progress-fill"></div>
                    <div class="np-progress-thumb" id="np-progress-thumb"></div>
                </div>
                <div class="np-time">
                    <span id="np-curr-time">0:00</span>
                    <span id="np-total-time">0:00</span>
                </div>
            </div>
            <div class="np-controls">
                <button id="np-shuffle"><i class="fa-solid fa-shuffle"></i></button>
                <button id="np-prev"><i class="fa-solid fa-backward-step"></i></button>
                <button id="np-play-btn" class="np-play-btn-large">
                    <i class="fa-solid fa-play play-icon"></i>
                    <i class="fa-solid fa-pause pause-icon" style="display:none;"></i>
                </button>
                <button id="np-next"><i class="fa-solid fa-forward-step"></i></button>
                <button id="np-repeat"><i class="fa-solid fa-repeat"></i></button>
            </div>
            <div class="np-extras">
                <button id="np-share"><i class="fa-solid fa-share-nodes"></i></button>
                <button id="np-queue-btn"><svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M15 15H1v-1.5h14zm0-4.5H1V9h14zm-14-7A2.5 2.5 0 0 1 3.5 1h9a2.5 2.5 0 0 1 0 5h-9A2.5 2.5 0 0 1 1 3.5m2.5-1a1 1 0 0 0 0 2h9a1 1 0 1 0 0-2z"/></svg></button>
            </div>
        </main>

        <!-- Mini Player -->
        <div class="mini-player" id="mini-player" style="display:none;">
            <div class="mini-player-progress" id="mini-player-progress"></div>
            <div class="mini-player-content" id="mini-player-content">
                <div class="mini-player-art">
                    <div class="mini-player-art-placeholder">
                        <i class="fa-solid fa-music"></i>
                    </div>
                    <img id="mini-player-img" style="display:none;" />
                </div>
                <div class="mini-player-meta">
                    <p class="mini-player-title" id="mini-player-title">No track playing</p>
                    <p class="mini-player-artist" id="mini-player-artist"></p>
                </div>
                <button class="mini-player-play-btn" id="mini-player-play-btn">
                    <i class="fa-solid fa-play play-icon"></i>
                    <i class="fa-solid fa-pause pause-icon" style="display:none;"></i>
                </button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav" id="bottom-nav">
            <button class="nav-item active" data-page="home">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"><path d="M13.5 1.515a3 3 0 0 0-3 0L3 5.845a2 2 0 0 0-1 1.732V21a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-6h4v6a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V7.577a2 2 0 0 0-1-1.732z"/></svg>
                <span>Home</span>
            </button>
            <button class="nav-item" data-page="search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>Search</span>
            </button>
            <button class="nav-item" data-page="library">
                <img src="/static/images/library_icon.png" alt="" width="24" height="24" class="nav-icon-img">
                <span>Your Library</span>
            </button>
        </nav>
    </div>

    <!-- Context Menu -->
    <div class="ctx-overlay" id="ctx-overlay" style="display:none;"></div>
    <div class="ctx-menu" id="ctx-menu" style="display:none;">
        <div class="ctx-handle"></div>
        <div class="ctx-header">
            <div class="ctx-header-art" id="ctx-header-art">
                <div class="ctx-art-placeholder"><i class="fa-solid fa-music"></i></div>
                <img id="ctx-header-img" style="display:none;" />
            </div>
            <div class="ctx-header-info">
                <p class="ctx-header-title" id="ctx-header-title"></p>
                <p class="ctx-header-artist" id="ctx-header-artist"></p>
            </div>
        </div>
        <div class="ctx-items">
            <button class="ctx-item" data-action="play">
                <i class="fa-solid fa-play"></i>
                <span>Play</span>
            </button>
            <button class="ctx-item" data-action="add-queue">
                <i class="fa-solid fa-list"></i>
                <span>Add to Queue</span>
            </button>
            <button class="ctx-item" data-action="add-playlist">
                <i class="fa-solid fa-plus"></i>
                <span>Add to Playlist</span>
            </button>
            <button class="ctx-item" data-action="like">
                <i class="fa-regular fa-heart"></i>
                <span id="ctx-like-text">Like</span>
            </button>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div class="confirm-overlay" id="confirm-overlay" style="display:none;">
        <div class="confirm-modal">
            <div class="confirm-modal-header">
                <h2 id="confirm-title"><i class="fa-solid fa-triangle-exclamation"></i> <span id="confirm-title-text">Confirm</span></h2>
            </div>
            <div class="confirm-modal-content">
                <p id="confirm-message">Are you sure?</p>
            </div>
            <div class="confirm-modal-footer">
                <button class="confirm-cancel-btn" id="confirm-cancel-btn">Cancel</button>
                <button class="confirm-delete-btn" id="confirm-delete-btn">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Audio element -->
    <audio id="audio-player" preload="metadata"></audio>

    <script type="module" src="/static/mobile/app.js?v=6"></script>
</body>
</html>
