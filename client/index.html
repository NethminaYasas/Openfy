<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="/static/images/logo.png">
    <title>Openfy - Web Player</title>
    <link rel="stylesheet" href="/static/styles.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-overlay" id="auth-overlay" style="display:flex;">
        <div class="auth-box">
            <div class="auth-logo"><img src="/static/images/logo.png" alt="Openfy"></div>
            <h2>Log in to Openfy</h2>
            <div class="auth-form" id="auth-signin">
                <input type="text" id="signin-hash" placeholder="Auth Hash" autocomplete="off" />
                <button class="auth-btn" id="signin-btn">Log In</button>
                <p class="auth-status" id="signin-status"></p>
            </div>
            <div class="auth-divider"><span>or</span></div>
            <div class="auth-form" id="auth-signup">
                <input type="text" id="signup-name" placeholder="Username" autocomplete="off" />
                <button class="auth-btn auth-btn-outline" id="signup-btn">Sign Up</button>
                <p class="auth-status" id="signup-status"></p>
            </div>
        </div>
    </div>

    <div class="top-bar" id="top-bar" style="display:none;">
        <div class="top-bar-left"></div>
        <div class="top-bar-center">
            <i class="fa-solid fa-house nav-icon-btn" id="top-bar-home"></i>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input id="search-input" type="text" placeholder="What do you want to play?" autocomplete="off" />
            </div>
        </div>
        <div class="top-bar-right">
            <div class="user-menu" id="user-menu">
                <i class="fa-solid fa-user user-icon" id="user-icon"></i>
                 <div class="user-dropdown" id="user-dropdown">
                     <span class="dropdown-username" id="dropdown-username"></span>
                     <div class="dropdown-divider"></div>
                     <div class="dropdown-item" id="profile-btn"><i class="fa-solid fa-user"></i> Profile</div>
                     <div class="dropdown-item" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Log out</div>
                 </div>
            </div>
        </div>
    </div>

    <div class="main" id="app-main" style="display:none;">
        <div class="sidebar">
            <div class="nav">
                <div class="nav-option nav-link active" data-page="library">
                    <i class="fa-solid fa-upload"></i>
                    <a href="#">Upload</a>
                </div>
            </div>
            <div class="library">
                <div class="options">
                    <div class="lib-option nav-option">
                        <img src="/static/images/library_icon.png">
                        <a href="#">Your Library</a>
                    </div>
                    <div class="icons">
                        <i class="fa-solid fa-plus" id="new-playlist-btn"></i>
                    </div>
                </div>
                <div class="lib-box" id="lib-box"></div>
            </div>
        </div>

        <div class="main-content">
            <div class="page active" id="page-home">
                <div class="section">
                    <div class="section-header">
                        <h2>Most Played</h2>
                    </div>
                    <div class="cards-container" id="most-played-grid"></div>
                </div>
                <div class="section">
                    <div class="section-header">
                        <h2>Library</h2>
                    </div>
                    <div class="cards-container" id="tracks-grid"></div>
                </div>
                <div class="footer"><div class="line"></div></div>
            </div>

            <div class="page" id="page-library">
                <div class="section">
                    <h2>Upload from Link</h2>
                    <div class="add-form" id="download-form">
                        <input id="download-url" type="text" placeholder="Paste Spotify/YouTube link" autocomplete="off" />
                        <button class="badge" id="download-button">Upload</button>
                    </div>
                    <p class="status" id="download-status"></p>
                </div>
                <div class="footer"><div class="line"></div></div>
            </div>

            <div class="page" id="page-playlist">
                <div class="section">
                    <div class="playlist-header">
                        <div class="playlist-cover" id="playlist-cover"></div>
                        <div class="playlist-info">
                            <p class="playlist-type" id="playlist-type">Playlist</p>
                            <h1 id="playlist-name"></h1>
                            <p class="playlist-meta" id="playlist-meta"></p>
                        </div>
                    </div>
                </div>
                <div class="section">
                    <div class="playlist-tracks" id="playlist-tracks"></div>
                </div>
            </div>
        </div>

        <div class="now-playing-panel">
            <div class="np-content" id="np-content">
                <div class="np-placeholder" id="np-placeholder">
                    <i class="fa-solid fa-music"></i>
                    <p>No track playing</p>
                </div>
                <div class="np-track" id="np-track" style="display:none;">
                    <div class="np-artwork-container">
                        <canvas class="np-art-canvas" id="np-cover" width="260" height="260"></canvas>
                        <img class="np-art-img" id="np-img" style="display:none;" />
                    </div>
                    <div class="np-details">
                        <h2 class="np-title" id="np-title"></h2>
                        <p class="np-artist" id="np-artist"></p>
                        <p class="np-album" id="np-album"></p>
                    </div>
                    <div class="np-stats">
                        <div class="np-stat">
                            <i class="fa-solid fa-play"></i>
                            <span id="np-plays">0</span>
                            <small>plays</small>
                        </div>
                        <div class="np-stat">
                            <i class="fa-solid fa-clock"></i>
                            <span id="np-duration">0:00</span>
                            <small>duration</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="music-player">
            <div class="player-top">
                <div class="album">
                    <canvas class="art-canvas" id="now-cover" width="56" height="56"></canvas>
                    <div class="album-meta">
                        <p class="album-title" id="now-title"></p>
                        <p class="album-artist" id="now-artist"></p>
                    </div>
                </div>
                <div class="player">
                    <div class="player-controls">
                        <button class="player-btn" id="btn-shuffle" aria-label="Shuffle"><i class="fa-solid fa-shuffle"></i></button>
                        <button class="player-btn" id="btn-prev" aria-label="Previous"><i class="fa-solid fa-backward-step"></i></button>
                        <button class="player-btn play-btn" id="btn-play" aria-label="Play or pause"><i class="fa-solid fa-play play-icon"></i><i class="fa-solid fa-pause pause-icon"></i></button>
                        <button class="player-btn" id="btn-next" aria-label="Next"><i class="fa-solid fa-forward-step"></i></button>
                        <button class="player-btn" id="btn-repeat" aria-label="Repeat"><i class="fa-solid fa-repeat"></i></button>
                    </div>
                    <div class="playback-bar">
                        <span class="curr-time" id="curr-time">00:00</span>
                        <input type="range" min="0" max="100" class="progress-bar" step="1" id="progress-bar">
                        <span class="tot-time" id="tot-time">00:00</span>
                    </div>
                </div>
                <div class="controls">
                    <div class="volume-bar">
                        <i class="fa-solid fa-volume-high" id="volume-icon"></i>
                        <input type="range" min="0" max="100" class="volume-slider" step="1" id="volume-slider" value="100">
                    </div>
                </div>
            </div>
            <audio id="audio-player" preload="metadata"></audio>
        </div>
    </div>

    <script>
        const apiBase = localStorage.getItem("openfy_api") || "";
        let authHash = localStorage.getItem("openfy_auth") || "";
        let currentUser = null;
        let currentPlaylistId = null;
        let userPlaylists = [];

        const tracksGrid = document.getElementById("tracks-grid");
        const mostPlayedGrid = document.getElementById("most-played-grid");
        const searchInput = document.getElementById("search-input");
        const audioPlayer = document.getElementById("audio-player");
        const nowTitle = document.getElementById("now-title");
        const nowArtist = document.getElementById("now-artist");
        const nowCover = document.getElementById("now-cover");
        const npPlaceholder = document.getElementById("np-placeholder");
        const npTrack = document.getElementById("np-track");
        const npTitle = document.getElementById("np-title");
        const npArtist = document.getElementById("np-artist");
        const npAlbum = document.getElementById("np-album");
        const npPlays = document.getElementById("np-plays");
        const npDuration = document.getElementById("np-duration");
        const npCover = document.getElementById("np-cover");
        const npImg = document.getElementById("np-img");
        const progressBar = document.getElementById("progress-bar");
        const currTime = document.getElementById("curr-time");
        const totTime = document.getElementById("tot-time");
        const libBox = document.getElementById("lib-box");
        const userIcon = document.getElementById("user-icon");
        const userDropdown = document.getElementById("user-dropdown");
        const dropdownUsername = document.getElementById("dropdown-username");
        const userMenu = document.getElementById("user-menu");
        const authOverlay = document.getElementById("auth-overlay");
        const appMain = document.getElementById("app-main");
        const topBar = document.getElementById("top-bar");
        const topBarHome = document.getElementById("top-bar-home");

        const pages = { home: document.getElementById("page-home"), library: document.getElementById("page-library"), playlist: document.getElementById("page-playlist") };
        const btnPlay = document.getElementById("btn-play");
        const btnPrev = document.getElementById("btn-prev");
        const btnNext = document.getElementById("btn-next");

        let currentQueue = [];
        let currentIndex = -1;
        let currentTrackId = null;

        function withBase(path) { return apiBase ? apiBase + path : path; }
        function apiHeaders() { const h = {}; if (authHash) h["x-auth-hash"] = authHash; return h; }

        async function api(url, opts) {
            opts = opts || {};
            const headers = Object.assign({}, apiHeaders(), opts.headers || {});
            if (opts.body && typeof opts.body === "string" && !headers["Content-Type"]) headers["Content-Type"] = "application/json";
            const res = await fetch(withBase(url), Object.assign({}, opts, { headers: headers }));
            if (!res.ok) { const text = await res.text(); throw new Error(text || ("HTTP " + res.status)); }
            const ct = res.headers.get("content-type") || "";
            if (ct.includes("application/json")) return res.json();
            return res.text();
        }

        function setActivePage(pageId) {
            Object.values(pages).forEach(function(p) { p.classList.remove("active"); });
            var target = pages[pageId] || pages.home;
            target.classList.add("active");
            document.querySelectorAll(".nav-link").forEach(function(link) { link.classList.toggle("active", link.dataset.page === pageId); });
        }

        function formatDuration(seconds) {
            if (!seconds || Number.isNaN(seconds)) return "00:00";
            var mins = Math.floor(seconds / 60);
            var secs = Math.floor(seconds % 60).toString().padStart(2, "0");
            return mins + ":" + secs;
        }

        function seededColor(seed) {
            var hash = 0;
            for (var i = 0; i < seed.length; i++) { hash = seed.charCodeAt(i) + ((hash << 5) - hash); }
            var hue = Math.abs(hash) % 360;
            return "hsl(" + hue + ", 70%, 50%)";
        }

        function drawCanvas(canvas, title, artist) {
            var ctx = canvas.getContext("2d");
            var label = ((title || "") + " " + (artist || "")).trim() || "Openfy";
            var colorA = seededColor(label);
            var colorB = seededColor(label.split(" ").reverse().join(" "));
            var gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, colorA);
            gradient.addColorStop(1, colorB);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0,0,0,0.35)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            ctx.font = Math.floor(canvas.width / 5) + "px Montserrat, sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            var initials = label.split(" ").filter(Boolean).slice(0, 2).map(function(w) { return w[0].toUpperCase(); }).join("");
            ctx.fillText(initials || "OF", canvas.width / 2, canvas.height / 2);
        }

        function clearCanvas(canvas) { var ctx = canvas.getContext("2d"); ctx.clearRect(0, 0, canvas.width, canvas.height); }

        function createArtCanvas(title, artist) {
            var canvas = document.createElement("canvas");
            canvas.className = "art-canvas";
            canvas.width = 180;
            canvas.height = 180;
            drawCanvas(canvas, title, artist);
            return canvas;
        }

        function buildTrackCard(track, list, index) {
            var card = document.createElement("div");
            card.className = "card";
            var art = createArtCanvas(track.title, track.artist && track.artist.name);
            var img = document.createElement("img");
            img.className = "card-img";
            img.src = withBase("/tracks/" + track.id + "/artwork?v=" + encodeURIComponent(track.updated_at || ""));
            img.alt = track.title;
            img.style.display = "none";
            img.addEventListener("load", function() { art.style.display = "none"; img.style.display = "block"; });
            img.addEventListener("error", function() { img.style.display = "none"; art.style.display = "block"; });
            card.appendChild(art);
            card.appendChild(img);
            var title = document.createElement("p");
            title.className = "card-title";
            title.textContent = track.title;
            var info = document.createElement("p");
            info.className = "card-info";
            info.textContent = (track.artist && track.artist.name ? track.artist.name : "Unknown") + " \u2022 " + formatDuration(track.duration);
            card.appendChild(title);
            card.appendChild(info);
            card.addEventListener("click", function() { currentQueue = list; currentIndex = index; playTrack(track); });
            return card;
        }

        function renderTracks(tracks) {
            tracksGrid.innerHTML = "";
            if (!tracks.length) { tracksGrid.innerHTML = '<div class="card"><p class="card-title">No tracks yet</p><p class="card-info">Download a track to start</p></div>'; return; }
            tracks.forEach(function(track, index) { tracksGrid.appendChild(buildTrackCard(track, tracks, index)); });
        }

        function renderMostPlayed(tracks) {
            mostPlayedGrid.innerHTML = "";
            if (!tracks.length) { mostPlayedGrid.innerHTML = '<div class="card"><p class="card-title">No plays yet</p><p class="card-info">Play a track to build this list</p></div>'; return; }
            tracks.forEach(function(track, index) { mostPlayedGrid.appendChild(buildTrackCard(track, tracks, index)); });
        }

        async function loadTracks() {
            try { var data = await api("/tracks?limit=24"); renderTracks(Array.isArray(data) ? data : []); } catch (err) { console.error(err); }
        }

        async function loadMostPlayed() {
            try { var data = await api("/tracks/most-played?limit=12"); renderMostPlayed(Array.isArray(data) ? data : []); } catch (err) { console.error(err); }
        }

        async function downloadFromLink() {
            var url = document.getElementById("download-url").value.trim();
            var dlStatus = document.getElementById("download-status");
            if (!url) { dlStatus.textContent = "Paste a link first."; return; }
            if (!url.startsWith("http")) { dlStatus.textContent = "Paste a valid https:// link."; return; }
            dlStatus.textContent = "Queuing download\u2026";
            try {
                var jobData = await api("/downloads", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ query: url, source: "spotiflac" }) });
                pollJobStatus(jobData.id, dlStatus);
            } catch (err) { console.error(err); dlStatus.textContent = "Download failed. " + (err.message || ""); }
        }

        function pollJobStatus(jobId, dlStatus) {
            var poll = setInterval(function() {
                api("/downloads/" + jobId).then(function(job) {
                    if (job.status === "completed") {
                        clearInterval(poll);
                        dlStatus.textContent = "Download completed.";
                        loadTracks(); loadMostPlayed();
                        document.getElementById("download-url").value = "";
                        setTimeout(function() { dlStatus.textContent = ""; }, 3000);
                    } else if (job.status === "failed") {
                        clearInterval(poll);
                        dlStatus.textContent = "Download failed. " + (job.log || "Unknown error.");
                    } else {
                        dlStatus.textContent = "Downloading\u2026 " + (job.status || "");
                    }
                }).catch(function(err) { clearInterval(poll); dlStatus.textContent = "Poll error: " + err.message; });
            }, 3000);
        }

        async function runSearch() {
            var query = searchInput.value.trim();
            if (!query) { loadTracks(); return; }
            try { var data = await api("/search?q=" + encodeURIComponent(query) + "&limit=24"); renderTracks(Array.isArray(data) ? data : []); } catch (err) { console.error(err); }
        }

        async function deleteTrack(trackId) {
            try { await api("/tracks/" + trackId, { method: "DELETE" }); loadTracks(); loadMostPlayed(); } catch (err) { console.error(err); }
        }

        function playTrack(track) {
            currentTrackId = track.id;
            audioPlayer.src = withBase("/tracks/" + track.id + "/stream");
            audioPlayer.play().catch(function(err) { console.error(err); });
            nowTitle.textContent = track.title || "";
            nowArtist.textContent = (track.artist && track.artist.name) || "";
            clearCanvas(nowCover);
            nowCover.classList.remove("visible");
            var img = new Image();
            img.onload = function() {
                var ctx = nowCover.getContext("2d");
                ctx.clearRect(0, 0, nowCover.width, nowCover.height);
                var size = Math.min(img.width, img.height);
                ctx.drawImage(img, (img.width - size) / 2, (img.height - size) / 2, size, size, 0, 0, nowCover.width, nowCover.height);
                nowCover.classList.add("visible");
            };
            img.onerror = function() { drawCanvas(nowCover, track.title, (track.artist && track.artist.name) || ""); nowCover.classList.add("visible"); };
            img.src = withBase("/tracks/" + track.id + "/artwork?v=" + encodeURIComponent(track.updated_at || ""));
            updateNowPlaying(track);
        }

        function updateNowPlaying(track) {
            npPlaceholder.style.display = "none";
            npTrack.style.display = "block";
            npTitle.textContent = track.title || "";
            npArtist.textContent = (track.artist && track.artist.name) || "Unknown";
            npAlbum.textContent = (track.album && track.album.title) || "";
            npPlays.textContent = track.play_count || 0;
            npDuration.textContent = formatDuration(track.duration);
            clearCanvas(npCover);
            npCover.style.display = "none";
            npImg.style.display = "none";
            var npImgEl = new Image();
            npImgEl.onload = function() {
                npImg.src = npImgEl.src;
                npImg.style.display = "block";
                npCover.style.display = "none";
            };
            npImgEl.onerror = function() {
                drawCanvas(npCover, track.title, (track.artist && track.artist.name) || "");
                npCover.style.display = "block";
                npImg.style.display = "none";
            };
            npImgEl.src = withBase("/tracks/" + track.id + "/artwork?v=" + encodeURIComponent(track.updated_at || ""));
        }

        function togglePlay() {
            if (!audioPlayer.src || audioPlayer.src === window.location.href) return;
            if (audioPlayer.paused) { audioPlayer.play().catch(function(err) { console.error(err); }); } else { audioPlayer.pause(); }
        }

        function playByIndex(index) {
            if (!currentQueue.length) return;
            var safeIndex = (index + currentQueue.length) % currentQueue.length;
            currentIndex = safeIndex;
            playTrack(currentQueue[safeIndex]);
        }

        audioPlayer.addEventListener("loadedmetadata", function() { totTime.textContent = formatDuration(audioPlayer.duration); });
        audioPlayer.addEventListener("play", function() { btnPlay.classList.add("playing"); progressBar.classList.add("active"); });
        audioPlayer.addEventListener("pause", function() { btnPlay.classList.remove("playing"); progressBar.classList.remove("active"); });

        function updateProgressFill() {
            var pct = audioPlayer.duration ? (audioPlayer.currentTime / audioPlayer.duration) * 100 : 0;
            progressBar.style.setProperty("--progress", pct + "%");
            progressBar.value = pct;
        }

        var lastSmoothTime = 0;
        function smoothProgress(timestamp) {
            if (!audioPlayer.paused && audioPlayer.duration) {
                if (!lastSmoothTime || timestamp - lastSmoothTime >= 100) {
                    currTime.textContent = formatDuration(audioPlayer.currentTime);
                    updateProgressFill();
                    lastSmoothTime = timestamp;
                }
            }
            requestAnimationFrame(smoothProgress);
        }
        requestAnimationFrame(smoothProgress);

        audioPlayer.addEventListener("timeupdate", function() {
            currTime.textContent = formatDuration(audioPlayer.currentTime);
            updateProgressFill();
        });

        audioPlayer.addEventListener("ended", function() { playByIndex(currentIndex + 1); });

        progressBar.addEventListener("input", function() {
            if (audioPlayer.duration) { audioPlayer.currentTime = (progressBar.value / 100) * audioPlayer.duration; updateProgressFill(); }
        });

        topBarHome.addEventListener("click", function(event) {
            event.preventDefault();
            setActivePage("home");
        });

        document.querySelectorAll(".nav-link").forEach(function(link) { link.addEventListener("click", function(event) { event.preventDefault(); setActivePage(link.dataset.page || "home"); }); });
        document.getElementById("download-button").addEventListener("click", function(event) { event.preventDefault(); downloadFromLink(); });
        searchInput.addEventListener("input", function() { runSearch(); });
        btnPlay.addEventListener("click", function(event) { event.preventDefault(); togglePlay(); });
        btnPrev.addEventListener("click", function(event) { event.preventDefault(); if (audioPlayer.currentTime > 3) { audioPlayer.currentTime = 0; } else { playByIndex(currentIndex - 1); } });
        btnNext.addEventListener("click", function(event) { event.preventDefault(); playByIndex(currentIndex + 1); });

        var volumeSlider = document.getElementById("volume-slider");
        var volumeIcon = document.getElementById("volume-icon");
        audioPlayer.volume = 1;
        volumeSlider.addEventListener("input", function() {
            audioPlayer.volume = volumeSlider.value / 100;
            volumeSlider.style.setProperty("--volume", volumeSlider.value + "%");
            volumeIcon.className = audioPlayer.volume === 0 ? "fa-solid fa-volume-xmark" : audioPlayer.volume < 0.5 ? "fa-solid fa-volume-low" : "fa-solid fa-volume-high";
        });
        volumeSlider.style.setProperty("--volume", "100%");
        volumeIcon.addEventListener("click", function() {
            if (audioPlayer.volume > 0) { audioPlayer.dataset.prevVolume = audioPlayer.volume; audioPlayer.volume = 0; volumeSlider.value = 0; volumeIcon.className = "fa-solid fa-volume-xmark"; }
            else { var prev = parseFloat(audioPlayer.dataset.prevVolume) || 1; audioPlayer.volume = prev; volumeSlider.value = Math.round(prev * 100); volumeIcon.className = prev < 0.5 ? "fa-solid fa-volume-low" : "fa-solid fa-volume-high"; }
        });

        async function loadPlaylists() {
            try { userPlaylists = await api("/playlists"); renderLibrary(); } catch (err) { console.error(err); }
        }

        function renderLibrary() {
            libBox.innerHTML = "";
            userPlaylists.forEach(function(pl) {
                var item = document.createElement("div");
                item.className = "lib-item";
                var bg = pl.is_liked ? "linear-gradient(135deg,#450af5,#c4efd9)" : "#282828";
                var icon = pl.is_liked ? '<i class="fa-solid fa-heart"></i>' : '<i class="fa-solid fa-list"></i>';
                item.innerHTML = '<div class="lib-item-cover" style="background:' + bg + '">' + icon + '</div><div class="lib-item-info"><p class="lib-item-name">' + pl.name + '</p><p class="lib-item-type">Playlist</p></div>';
                item.addEventListener("click", function() { openPlaylist(pl.id); });
                libBox.appendChild(item);
            });
        }

        async function openPlaylist(playlistId) {
            currentPlaylistId = playlistId;
            try {
                var pl = await api("/playlists/" + playlistId);
                var tracks = await api("/playlists/" + playlistId + "/tracks");
                document.getElementById("playlist-name").textContent = pl.name;
                document.getElementById("playlist-type").textContent = pl.is_liked ? "Playlist" : "Playlist";
                document.getElementById("playlist-meta").textContent = tracks.length + " songs";
                var cover = document.getElementById("playlist-cover");
                cover.style.background = pl.is_liked ? "linear-gradient(135deg,#450af5,#c4efd9)" : "#282828";
                cover.innerHTML = pl.is_liked ? '<i class="fa-solid fa-heart"></i>' : '<i class="fa-solid fa-list"></i>';
                var container = document.getElementById("playlist-tracks");
                container.innerHTML = "";
                tracks.forEach(function(pt, i) {
                    var row = document.createElement("div");
                    row.className = "playlist-track-row";
                    var removeHtml = pl.is_liked ? "" : '<button class="pt-remove" data-track="' + pt.track.id + '"><i class="fa-solid fa-xmark"></i></button>';
                    row.innerHTML = '<span class="pt-num">' + (i + 1) + '</span><span class="pt-title">' + pt.track.title + '</span><span class="pt-artist">' + (pt.track.artist && pt.track.artist.name ? pt.track.artist.name : "Unknown") + '</span><span class="pt-duration">' + formatDuration(pt.track.duration) + '</span>' + removeHtml;
                    row.querySelector(".pt-title").addEventListener("click", function() { currentQueue = tracks.map(function(t) { return t.track; }); currentIndex = i; playTrack(pt.track); });
                    row.querySelector(".pt-title").style.cursor = "pointer";
                    var removeBtn = row.querySelector(".pt-remove");
                    if (removeBtn) { removeBtn.addEventListener("click", async function(e) { e.stopPropagation(); await api("/playlists/" + playlistId + "/tracks/" + pt.track.id, { method: "DELETE" }); openPlaylist(playlistId); }); }
                    container.appendChild(row);
                });
                setActivePage("playlist");
            } catch (err) { console.error(err); }
        }

        document.getElementById("new-playlist-btn").addEventListener("click", async function() {
            var name = prompt("Playlist name:");
            if (!name || !name.trim()) return;
            try { await api("/playlists", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name: name.trim() }) }); loadPlaylists(); } catch (err) { alert("Failed: " + err.message); }
        });

        userIcon.addEventListener("click", function(event) {
            event.stopPropagation();
            console.log("User icon clicked, toggling dropdown");
            userDropdown.classList.toggle("visible");
            console.log("Dropdown visible:", userDropdown.classList.contains("visible"));
        });

        userDropdown.addEventListener("click", function(event) {
            event.stopPropagation();
        });

        document.addEventListener("click", function(event) {
            if (!userMenu.contains(event.target)) {
                userDropdown.classList.remove("visible");
            }
        });

        document.getElementById("profile-btn").addEventListener("click", function() {
            if (!currentUser) return;
            userDropdown.classList.remove("visible");
            var info = "Username: " + currentUser.name + "\nAuth Hash: " + currentUser.auth_hash + "\nMember since: " + (currentUser.created_at || "N/A");
            alert(info);
        });

        document.getElementById("logout-btn").addEventListener("click", function() {
            localStorage.removeItem("openfy_auth");
            authHash = "";
            dropdownUsername.textContent = "";
            currentUser = null;
            authOverlay.style.display = "flex";
            userDropdown.classList.remove("visible");
            appMain.style.display = "none";
            topBar.style.display = "none";
        });

        document.getElementById("signup-btn").addEventListener("click", async function() {
            var name = document.getElementById("signup-name").value.trim();
            if (!name) { document.getElementById("signup-status").textContent = "Enter a username."; return; }
            try {
                var user = await api("/auth/signup", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name: name }) });
                document.getElementById("signup-status").textContent = "Your auth hash: " + user.auth_hash + ". Save it!";
            } catch (err) { document.getElementById("signup-status").textContent = err.message; }
        });

        document.getElementById("signin-btn").addEventListener("click", async function() {
            var hash = document.getElementById("signin-hash").value.trim();
            if (!hash) { document.getElementById("signin-status").textContent = "Enter your auth hash."; return; }
            try {
                var user = await api("/auth/signin", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ auth_hash: hash }) });
                authHash = user.auth_hash;
                currentUser = user;
                localStorage.setItem("openfy_auth", authHash);
                authOverlay.style.display = "none";
                appMain.style.display = "flex";
                topBar.style.display = "flex";
                dropdownUsername.textContent = user.name;
                loadTracks(); loadMostPlayed(); loadPlaylists();
            } catch (err) { document.getElementById("signin-status").textContent = err.message; }
        });

        async function tryAutoLogin() {
            if (!authHash) { console.log("No auth hash stored"); return false; }
            try {
                var url = withBase("/auth/me");
                console.log("Auto-login fetching:", url, "with hash:", authHash);
                var res = await fetch(url, { headers: { "x-auth-hash": authHash } });
                console.log("Auto-login response status:", res.status);
                if (res.ok) {
                    var user = await res.json();
                    console.log("Auto-login user:", user);
                    if (user && user.name) {
                        currentUser = user;
                        authOverlay.style.display = "none";
                        appMain.style.display = "flex";
                        topBar.style.display = "flex";
                        dropdownUsername.textContent = user.name;
                        return true;
                    }
                } else {
                    var errText = await res.text();
                    console.log("Auto-login failed:", res.status, errText);
                }
            } catch (err) {
                console.error("Auto-login error:", err);
            }
            return false;
        }

        clearCanvas(nowCover);
        (async function() {
            var ok = await tryAutoLogin();
            if (!ok) { authOverlay.style.display = "flex"; appMain.style.display = "none"; }
            else { loadTracks(); loadMostPlayed(); loadPlaylists(); }
        })();
    </script>
</body>
</html>
